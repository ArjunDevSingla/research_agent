services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./outputs:/app/outputs

  search-agent:
    build: ./services/search-agent
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    environment:
      - SEARCH_MAX_RESULTS=5

  planner:
    build: ./services/planner
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  similarity-worker:
    build: ./services/similarity-worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 3

  future-research-worker:
    build: ./services/future-research-worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: 2

  reconciler:
    build: ./services/reconciler
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure
    volumes:
      - ./outputs:/app/outputs

  lingo-service:
    build: ./services/lingo-service
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  dashboard:
    build: ./services/dashboard
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - gateway
    restart: on-failure

